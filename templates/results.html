<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="page-content">

        <div class="page-header">
            <h1>Pokemon Type Selector</h1>
            <p> {{ trainer }}'s Team </p>
        </div>

        <div class="poke-team">
            {% for key, value in data.items() %}
                <div class="poke-entry">
                    <img src="{{ value.img_url }}" width="50px">
                    <span class="poke-name"> {{ value.name }} </span>
                    <span class="poke-type-1"> {{ value.type_1 }} </span>
                    <span class="poke-type-2"> {{ value.type_2 }} </span>
                </div>
            {% endfor %}
        </div>
    </div>


</body>

</html>
