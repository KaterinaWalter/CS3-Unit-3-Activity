<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="page-content">

        <div class="page-header">
            <h1>Pokemon Type Lookup Tool</h1>
            <a href="{{ url_for('index') }}"><button>⬅ BACK</button></a>
            <p>Here are the options:</p>
        </div>

        <div class="poke-team">
            {% for key, value in data.items() %}
                {% if value.type_1 == type or value.type_2 == type %}
                <div class="poke-entry">
                    <img src="{{ value.img_url }}" width="50px">
                    <span class="poke-name"> {{ value.name }} </span>
                    <button class=" {{ value.type_1 }} "> {{ value.type_1 }} </button>
                    {% if value.type_2 %}
                    <button class=" {{ value.type_2 }} "> {{ value.type_2 }} </button>
                    {% endif %}
                </div>
                {% endif %}
            {% endfor %}
        </div>
    </div>


</body>

</html>
